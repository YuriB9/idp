# Oauth2-Proxy для сквозных E2E (ADR-0018). Отличается от локального
# oauth2-proxy.cfg одним: skip_jwt_bearer_tokens=true. Это позволяет E2E ходить
# на периметр с программным Bearer (id_token от password-grant idp-portal) без
# браузерной сессии/куки — токен валидируется как bearer JWT (issuer = Keycloak,
# audience = idp-portal) и проксируется на gateway, который проверяет его сам.

http_address = "0.0.0.0:4180"
reverse_proxy = true

provider = "keycloak-oidc"
oidc_issuer_url = "http://keycloak:8080/realms/idp"
client_id = "idp-portal"
client_secret = "idp-portal-secret"

# Локальный cookie-secret — ровно 32 байта (AES-256). Для прода — секрет из Vault.
cookie_secret = "idp-local-dev-cookie-secret-0001"
cookie_secure = false
email_domains = ["*"]

# Куда проксировать авторизованные запросы.
upstreams = ["http://gateway:8080"]

# Принимаем валидный bearer JWT (id_token) без редиректа на форму логина —
# ключевое отличие E2E-режима.
skip_jwt_bearer_tokens = true

# Пробрасываем токен вниз — gateway валидирует JWT сам (реальная проверка).
pass_authorization_header = true
pass_access_token = true
set_authorization_header = true
skip_provider_button = true
