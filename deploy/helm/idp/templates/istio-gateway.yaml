{{/*
Istio Gateway на ingressgateway: терминация внешнего TLS (ADR-0025). Сертификат —
из k8s Secret istio.gateway.tlsCredentialName (реальный TLS не в git). HTTP
редиректится на HTTPS.
*/}}
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: idp
  labels:
    {{- include "idp-lib.labels" (dict "root" $ "name" "idp") | nindent 4 }}
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.istio.gateway.tlsCredentialName }}
      hosts:
        - {{ .Values.istio.externalHost | quote }}
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.istio.externalHost | quote }}
      tls:
        httpsRedirect: true
