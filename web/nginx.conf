# nginx-конфиг production-портала IDP (раздача SPA из /usr/share/nginx/html).
# Слушает :8080 (nginx-unprivileged, non-root). Маршрутизация /api в Kubernetes
# выполняется Istio VirtualService на gateway (ADR-0009/0024) — здесь прокси /api
# НЕ настраивается осознанно (same-origin обеспечивается на уровне меша).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-маршрутизация (react-router): неизвестные пути отдают index.html,
    # чтобы клиентский роутер обработал их сам.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Хешированные ассеты Vite неизменяемы — кэшируем агрессивно.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
