syntax = "proto3";

// Пакет projects.v1 — контракт сервиса управления проектами для внутренних
// вызовов gateway↔projects (ADR-0002). В этом изменении — КАРКАС: типы и
// сигнатуры без доменной реализации (создание/перенос/удаление — отдельные
// changes). Статусы сервиса перечислены здесь как контракт (ADR-0004).
package projects.v1;

option go_package = "github.com/YuriB9/idp/pkg/api/projects/v1;projectsv1";

// ServiceStatus — статус создаваемой единицы (сервиса) в каталоге.
// Zero-value намеренно UNSPECIFIED (не маппить незнакомое в дефолт молча).
enum ServiceStatus {
  SERVICE_STATUS_UNSPECIFIED = 0;
  SERVICE_STATUS_CREATING = 1;
  SERVICE_STATUS_ACTIVE = 2;
  SERVICE_STATUS_DECOMMISSIONED = 3;
  SERVICE_STATUS_FAILED = 4;
  // SERVICE_STATUS_TRANSFERRING — транзитный статус на время переноса сервиса в
  // другой проект (ADR-0013). Защищает от конкурентных операций (guarded-CAS
  // active→transferring) и даёт наблюдаемость незавершённого переноса.
  // Аддитивное значение (новый номер 5; существующие значения не меняются).
  SERVICE_STATUS_TRANSFERRING = 5;
}

// ProjectsService — интерфейс каталога. Чтение (GetService/ListServices) и
// запуск создания сервиса (CreateService → стартует Temporal-workflow провизии,
// исполняемый DevInfra worker'ом, ADR-0001). Доменные user stories переноса и
// удаления добавляются последующими changes.
service ProjectsService {
  // GetService возвращает текущее состояние сервиса из каталога.
  // Отсутствие записи отображается в gRPC-статус NotFound.
  rpc GetService(GetServiceRequest) returns (GetServiceResponse);
  // ListServices возвращает страницу сервисов проекта с keyset-пагинацией
  // по непрозрачному курсору (сортировка по (created_at, id)).
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  // CreateService фиксирует запись каталога со статусом CREATING и запускает
  // Temporal-workflow «Создание сервиса» (детерминированный WorkflowID для
  // идемпотентности повторного запуска). Возвращает идентификатор записи и
  // стартовый статус CREATING. Сама провизия (GitLab/Vault/Harbor) выполняется
  // асинхронно worker'ом; финальный статус (ACTIVE/FAILED) — по завершении
  // workflow. BREAKING: добавление метода в существующий сервис-контракт.
  rpc CreateService(CreateServiceRequest) returns (CreateServiceResponse);
  // SetServiceOwners декларативно заменяет набор владельцев сервиса: клиент шлёт
  // полный желаемый набор owners и ожидаемую версию owners_version
  // (optimistic-concurrency). Сервер вычисляет diff и запускает Temporal-workflow
  // «Изменение владельцев» с детерминированным WorkflowID (идемпотентность
  // повторного запуска). Синхронизация GitLab/Vault/IDM выполняется асинхронно
  // worker'ом. Конфликт версии → FailedPrecondition; отсутствие записи →
  // NotFound. BREAKING: добавление метода в существующий сервис-контракт.
  rpc SetServiceOwners(SetServiceOwnersRequest) returns (SetServiceOwnersResponse);
  // DecommissionService выводит активный сервис из эксплуатации (soft delete):
  // данные каталога СОХРАНЯЮТСЯ, статус переводится guarded-CAS ACTIVE→DECOMMISSIONED,
  // во внешних системах отзывается доступ (GitLab archive, Harbor read-only, Vault
  // revoke SecretID) — асинхронно Temporal-workflow «Вывод из эксплуатации» с
  // детерминированным WorkflowID. Поле load_drained — явное предусловие снятой
  // нагрузки из K8s (в MVP K8s-worker нет, см. ADR-0012). Семантика идемпотентна:
  // повторный вызов на уже выведенном сервисе → успех (no-op). Допустимый исходный
  // статус — только ACTIVE; creating/failed или неснятая нагрузка →
  // FailedPrecondition; конкурентная смена статуса → Aborted; отсутствие записи →
  // NotFound. BREAKING: добавление метода в существующий сервис-контракт.
  rpc DecommissionService(DecommissionServiceRequest) returns (DecommissionServiceResponse);
  // TransferService переносит сервис в другой проект (смена project-владельца):
  // id записи каталога СОХРАНЯЕТСЯ, меняется колонка project (source→target),
  // владельцы переезжают вместе с записью. Перенос выполняется асинхронно
  // Temporal-workflow «Перенос» (Saga) с детерминированным WorkflowID: каталог
  // active→transferring → перенос репозитория GitLab в новую группу (ТОЧКА
  // НЕВОЗВРАТА) → миграция путей/политик Vault → обновление метаданных Harbor →
  // каталог transferring→active (project=target) → перенос ролей владельцев в IDM.
  // Требует ДВУХ прав: transfer на исходном проекте И transfer_in на целевом
  // (ADR-0013). Семантика идемпотентна: повторный вызов на уже перенесённом
  // сервисе (project уже равен target) → успех (no-op). Допустимый исходный
  // статус — только ACTIVE; creating/failed/decommissioned/transferring →
  // FailedPrecondition; занятое имя в target или конкурентная смена статуса →
  // Aborted; отсутствие записи → NotFound. BREAKING: добавление метода в
  // существующий сервис-контракт.
  rpc TransferService(TransferServiceRequest) returns (TransferServiceResponse);
}

// Service — запись каталога (единица-сервис).
message Service {
  // project — идентификатор проекта-владельца.
  string project = 1;
  // name — имя сервиса внутри проекта.
  string name = 2;
  // status — текущий статус записи.
  ServiceStatus status = 3;
  // owners — текущий набор владельцев сервиса (детерминированный порядок).
  repeated string owners = 4;
  // owners_version — версия набора владельцев для optimistic-concurrency.
  int64 owners_version = 5;
  // decommissioned_at — момент вывода сервиса из эксплуатации (RFC3339); пусто,
  // если сервис не выведен. Аддитивное поле (ADR-0012).
  string decommissioned_at = 6;
}

message GetServiceRequest {
  // project — идентификатор проекта.
  string project = 1;
  // name — имя сервиса внутри проекта.
  string name = 2;
}

message GetServiceResponse {
  string project = 1;
  string name = 2;
  ServiceStatus status = 3;
  // owners — текущий набор владельцев (детерминированный порядок).
  repeated string owners = 4;
  // owners_version — версия набора владельцев для optimistic-concurrency.
  int64 owners_version = 5;
  // decommissioned_at — момент вывода сервиса из эксплуатации (RFC3339); пусто,
  // если сервис не выведен. Аддитивное поле (ADR-0012).
  string decommissioned_at = 6;
}

message ListServicesRequest {
  // project — идентификатор проекта, чьи сервисы перечисляются.
  string project = 1;
  // page_size — желаемый размер страницы; сервер клампит к допустимому пределу.
  int32 page_size = 2;
  // page_token — непрозрачный курсор продолжения из предыдущего ответа;
  // пустой — с начала.
  string page_token = 3;
}

message ListServicesResponse {
  // services — страница записей в порядке (created_at, id).
  repeated Service services = 1;
  // next_page_token — курсор следующей страницы; пустой — конец выборки.
  string next_page_token = 2;
}

message CreateServiceRequest {
  // project — идентификатор проекта-владельца.
  string project = 1;
  // name — имя создаваемого сервиса внутри проекта.
  string name = 2;
}

message CreateServiceResponse {
  // id — идентификатор созданной записи каталога (UUID в строковом виде).
  string id = 1;
  // status — стартовый статус записи; сразу после запуска — CREATING.
  ServiceStatus status = 2;
}

message SetServiceOwnersRequest {
  // project — идентификатор проекта-владельца.
  string project = 1;
  // name — имя сервиса внутри проекта.
  string name = 2;
  // owners — полный желаемый набор владельцев (декларативно). Сервер нормализует
  // (без пустых строк и дублей) и вычисляет diff против текущего состояния.
  repeated string owners = 3;
  // expected_version — ожидаемая версия набора владельцев (optimistic-concurrency).
  // Несовпадение с актуальной версией → FailedPrecondition.
  int64 expected_version = 4;
}

message SetServiceOwnersResponse {
  // owners — итоговый набор владельцев после применения (детерминированный порядок).
  repeated string owners = 1;
  // owners_version — новая версия набора владельцев.
  int64 owners_version = 2;
}

message DecommissionServiceRequest {
  // project — идентификатор проекта-владельца.
  string project = 1;
  // name — имя выводимого из эксплуатации сервиса.
  string name = 2;
  // load_drained — явное предусловие: нагрузка сервиса снята из K8s. В MVP
  // K8s-worker отсутствует, поэтому снятие нагрузки подтверждается вызывающей
  // стороной (ADR-0012). false → FailedPrecondition до любых побочных эффектов.
  bool load_drained = 3;
}

message DecommissionServiceResponse {
  // service — итоговое состояние записи (status=DECOMMISSIONED, decommissioned_at).
  Service service = 1;
}

message TransferServiceRequest {
  // project — исходный проект-владелец (source), из которого переносится сервис.
  string project = 1;
  // name — имя переносимого сервиса (сохраняется при переносе).
  string name = 2;
  // target_project — целевой проект-владелец (target), в который переносится
  // сервис. Должен отличаться от project; пара (target_project, name) должна быть
  // свободна, иначе конфликт.
  string target_project = 3;
}

message TransferServiceResponse {
  // service — итоговое состояние записи (project=target_project, status=ACTIVE).
  Service service = 1;
}
