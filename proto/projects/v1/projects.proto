syntax = "proto3";

// Пакет projects.v1 — контракт сервиса управления проектами для внутренних
// вызовов gateway↔projects (ADR-0002). В этом изменении — КАРКАС: типы и
// сигнатуры без доменной реализации (создание/перенос/удаление — отдельные
// changes). Статусы сервиса перечислены здесь как контракт (ADR-0004).
package projects.v1;

option go_package = "github.com/YuriB9/idp/pkg/api/projects/v1;projectsv1";

// ServiceStatus — статус создаваемой единицы (сервиса) в каталоге.
// Zero-value намеренно UNSPECIFIED (не маппить незнакомое в дефолт молча).
enum ServiceStatus {
  SERVICE_STATUS_UNSPECIFIED = 0;
  SERVICE_STATUS_CREATING = 1;
  SERVICE_STATUS_ACTIVE = 2;
  SERVICE_STATUS_DECOMMISSIONED = 3;
  SERVICE_STATUS_FAILED = 4;
}

// ProjectsService — интерфейс каталога. Чтение (GetService/ListServices) и
// запуск создания сервиса (CreateService → стартует Temporal-workflow провизии,
// исполняемый DevInfra worker'ом, ADR-0001). Доменные user stories переноса и
// удаления добавляются последующими changes.
service ProjectsService {
  // GetService возвращает текущее состояние сервиса из каталога.
  // Отсутствие записи отображается в gRPC-статус NotFound.
  rpc GetService(GetServiceRequest) returns (GetServiceResponse);
  // ListServices возвращает страницу сервисов проекта с keyset-пагинацией
  // по непрозрачному курсору (сортировка по (created_at, id)).
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  // CreateService фиксирует запись каталога со статусом CREATING и запускает
  // Temporal-workflow «Создание сервиса» (детерминированный WorkflowID для
  // идемпотентности повторного запуска). Возвращает идентификатор записи и
  // стартовый статус CREATING. Сама провизия (GitLab/Vault/Harbor) выполняется
  // асинхронно worker'ом; финальный статус (ACTIVE/FAILED) — по завершении
  // workflow. BREAKING: добавление метода в существующий сервис-контракт.
  rpc CreateService(CreateServiceRequest) returns (CreateServiceResponse);
}

// Service — запись каталога (единица-сервис).
message Service {
  // project — идентификатор проекта-владельца.
  string project = 1;
  // name — имя сервиса внутри проекта.
  string name = 2;
  // status — текущий статус записи.
  ServiceStatus status = 3;
}

message GetServiceRequest {
  // project — идентификатор проекта.
  string project = 1;
  // name — имя сервиса внутри проекта.
  string name = 2;
}

message GetServiceResponse {
  string project = 1;
  string name = 2;
  ServiceStatus status = 3;
}

message ListServicesRequest {
  // project — идентификатор проекта, чьи сервисы перечисляются.
  string project = 1;
  // page_size — желаемый размер страницы; сервер клампит к допустимому пределу.
  int32 page_size = 2;
  // page_token — непрозрачный курсор продолжения из предыдущего ответа;
  // пустой — с начала.
  string page_token = 3;
}

message ListServicesResponse {
  // services — страница записей в порядке (created_at, id).
  repeated Service services = 1;
  // next_page_token — курсор следующей страницы; пустой — конец выборки.
  string next_page_token = 2;
}

message CreateServiceRequest {
  // project — идентификатор проекта-владельца.
  string project = 1;
  // name — имя создаваемого сервиса внутри проекта.
  string name = 2;
}

message CreateServiceResponse {
  // id — идентификатор созданной записи каталога (UUID в строковом виде).
  string id = 1;
  // status — стартовый статус записи; сразу после запуска — CREATING.
  ServiceStatus status = 2;
}
