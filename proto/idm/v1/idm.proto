syntax = "proto3";

// Пакет idm.v1 — контракт сервиса IDM (права/роли). Источник правды для
// внутренних вызовов gateway↔idm (ADR-0002). В MVP — минимальный RBAC через
// CheckAccess; интерфейс целевой, наполнение ролей — позже.
package idm.v1;

option go_package = "github.com/YuriB9/idp/pkg/api/idm/v1;idmv1";

// AccessService отвечает на вопрос «можно ли субъекту выполнить действие над
// ресурсом».
service AccessService {
  // CheckAccess проверяет право субъекта на действие над ресурсом.
  rpc CheckAccess(CheckAccessRequest) returns (CheckAccessResponse);
}

// RoleAdminService — управляющий контракт ролей: программная выдача/отзыв роли
// субъекту для синхронизации из доменных потоков (например, «Изменение
// владельцев»). После изменения привязок IDM инвалидирует кэш решений по
// затронутому субъекту. Путь не публичный (не периметр); вызывается доменными
// сервисами/worker'ом. BREAKING: добавление сервиса в существующий контракт idm.
service RoleAdminService {
  // AssignRole выдаёт субъекту роль (идемпотентно: повторная выдача — успех).
  // Несуществующая роль → NotFound; пустые поля → InvalidArgument.
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  // RevokeRole отзывает у субъекта роль (идемпотентно: отзыв отсутствующей — успех).
  // Пустые поля → InvalidArgument.
  rpc RevokeRole(RevokeRoleRequest) returns (RevokeRoleResponse);
}

// IamAdminService — читающий контракт IAM-админки (ADR-0014): просмотр каталога
// ролей/прав и привязок субъект↔роль. Только чтение (без побочных эффектов на
// кэш решений). Путь привилегированный: gateway проверяет право (read,
// iam:global) перед КАЖДОЙ ручкой (fail-closed). Расширение аддитивно
// (wire-совместимо): новый сервис и сообщения, существующие RPC не меняются.
// Мутации привязок выполняет RoleAdminService (переиспользуется, не дублируется).
service IamAdminService {
  // ListRoles возвращает все роли каталога (без пагинации — справочник мал).
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  // ListPermissions возвращает все права каталога (без пагинации).
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  // GetRolePermissions возвращает права конкретной роли. Несуществующая роль →
  // NotFound; пустое имя → InvalidArgument.
  rpc GetRolePermissions(GetRolePermissionsRequest) returns (GetRolePermissionsResponse);
  // ListSubjectsWithRoles перечисляет субъектов (DISTINCT subject из
  // subject_roles) с их ролями; keyset-пагинация по subject (ASC). Субъекты без
  // ролей системе неизвестны и не возвращаются.
  rpc ListSubjectsWithRoles(ListSubjectsWithRolesRequest) returns (ListSubjectsWithRolesResponse);
  // GetSubjectRoles возвращает роли субъекта (пустой набор, не NotFound, если
  // ролей нет); пустой subject → InvalidArgument.
  rpc GetSubjectRoles(GetSubjectRolesRequest) returns (GetSubjectRolesResponse);
}

// IamCatalogService — мутирующий контракт каталога IAM (ADR-0015): структурные
// изменения самого каталога ролей/прав — создание/удаление ролей и прав,
// правка набора прав роли (attach/detach). Путь привилегированный: gateway
// проверяет право (manage, iam:global) перед КАЖДОЙ ручкой (fail-closed),
// отдельно и привилегированнее, чем write (assign/revoke). Любая структурная
// мутация → ШИРОКАЯ инвалидация кэша решений (поколение idm:cache:gen), т.к.
// правка role_permissions/удаление роли затрагивает ВСЕХ носителей роли.
// Системные (сидированные) роли/права защищены от удаления и правки набора прав
// (FailedPrecondition). Расширение аддитивно (wire-совместимо): новый сервис и
// сообщения, существующие RPC не меняются. Мутации привязок субъект↔роль
// выполняет RoleAdminService (переиспользуется, не дублируется).
service IamCatalogService {
  // CreateRole создаёт пользовательскую роль (system=false). Дубль имени →
  // AlreadyExists (не идемпотентно); пустое имя → InvalidArgument.
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  // DeleteRole удаляет роль (каскад subject_roles/role_permissions). Системная
  // роль → FailedPrecondition; несуществующая → NotFound.
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
  // CreatePermission создаёт пользовательское право (system=false). Дубль пары
  // (action, resource) → AlreadyExists; пустые поля → InvalidArgument.
  rpc CreatePermission(CreatePermissionRequest) returns (CreatePermissionResponse);
  // DeletePermission удаляет право (каскад role_permissions). Системное право →
  // FailedPrecondition; несуществующее → NotFound.
  rpc DeletePermission(DeletePermissionRequest) returns (DeletePermissionResponse);
  // AttachPermission прикрепляет право к роли (идемпотентно: повтор — успех).
  // Роль/право не найдены → NotFound; системная роль → FailedPrecondition.
  // Возвращает актуальный набор прав роли.
  rpc AttachPermission(AttachPermissionRequest) returns (AttachPermissionResponse);
  // DetachPermission открепляет право от роли (идемпотентно: открепление
  // непривязанного — успех). Роль не найдена → NotFound; системная роль →
  // FailedPrecondition. Возвращает актуальный набор прав роли.
  rpc DetachPermission(DetachPermissionRequest) returns (DetachPermissionResponse);
}

// IdentityService — читающий контракт справочника субъектов из каталога
// идентичностей (OIDC/Keycloak, ADR-0016). Резолвит канонический ключ субъекта
// (sub из JWT, он же subject_roles.subject) в человекочитаемую идентичность
// (username/email/display name) и ищет пользователей realm для пикера назначения
// роли. Источник правды — живой запрос в Keycloak Admin REST + кэш с TTL
// (ОТДЕЛЬНЫЙ от кэша решений RBAC). Путь привилегированный: gateway проверяет
// право (read, iam:directory) перед КАЖДОЙ ручкой (fail-closed). Справочник НЕ
// критичен для CheckAccess (решение по sub не зависит от имён): при недоступном
// Keycloak ручки деградируют (Unavailable), управление ролями по сырому subject
// не ломается. Расширение аддитивно (wire-совместимо): новый сервис и сообщения,
// существующие RPC не меняются.
service IdentityService {
  // SearchSubjects ищет пользователей каталога по строке (username/email/имя) с
  // постраничной выдачей. Пустой/слишком короткий query или превышение лимита
  // page_size → InvalidArgument; недоступность Keycloak → Unavailable.
  rpc SearchSubjects(SearchSubjectsRequest) returns (SearchSubjectsResponse);
  // ResolveSubjects резолвит набор канонических ключей (sub) в идентичности
  // (батч). Отсутствующий в каталоге субъект возвращается с found=false (не
  // опускается) — «осиротевший». Пустой список → InvalidArgument; недоступность
  // Keycloak → Unavailable.
  rpc ResolveSubjects(ResolveSubjectsRequest) returns (ResolveSubjectsResponse);
}

// SubjectIdentity — идентичность субъекта из каталога Keycloak.
message SubjectIdentity {
  // subject — канонический ключ субъекта = sub (UUID Keycloak); тот же, что в
  // subject_roles.subject и auth.Claims.Subject.
  string subject = 1;
  // username — имя входа (preferred_username); ключом авторизации НЕ является.
  string username = 2;
  // email — адрес электронной почты пользователя.
  string email = 3;
  // display_name — отображаемое имя (имя + фамилия), если задано.
  string display_name = 4;
  // enabled — активен ли пользователь в realm.
  bool enabled = 5;
  // found — найден ли субъект в каталоге; false → «осиротевший» (роль есть, в
  // каталоге нет).
  bool found = 6;
}

message SearchSubjectsRequest {
  // query — строка поиска (username/email/имя); непустая, не короче минимума.
  string query = 1;
  // cursor — непрозрачный курсор страницы (поверх offset Keycloak); пусто —
  // первая страница.
  string cursor = 2;
  // page_size — желаемый размер страницы; сервер клампит к пределу (0 → дефолт).
  int32 page_size = 3;
}

message SearchSubjectsResponse {
  // subjects — страница найденных идентичностей (found=true).
  repeated SubjectIdentity subjects = 1;
  // next_cursor — непрозрачный курсор следующей страницы (пусто — больше нет).
  string next_cursor = 2;
}

message ResolveSubjectsRequest {
  // subjects — канонические ключи (sub) для резолва (непустой список).
  repeated string subjects = 1;
}

message ResolveSubjectsResponse {
  // subjects — идентичности в том же составе ключей; отсутствующие — found=false.
  repeated SubjectIdentity subjects = 1;
}

// Role — роль каталога. Стабильный идентификатор роли — её name (им же оперируют
// AssignRole/RevokeRole); внутренний id (UUID) наружу не отдаётся.
message Role {
  // name — человекочитаемое уникальное имя роли.
  string name = 1;
  // system — признак системной (сидированной) роли: такие роли защищены от
  // удаления и правки набора прав через API (ADR-0015). Поле аддитивно
  // (wire-совместимо): старые клиенты, не знающие о нём, видят false.
  bool system = 2;
}

// Permission — право: пара (action, resource), сравнение строгое.
message Permission {
  // action — действие (например, "read", "write", "create", "manage").
  string action = 1;
  // resource — целевой ресурс (например, "iam:global", "project:demo").
  string resource = 2;
  // system — признак системного (сидированного) права: защищено от удаления
  // через API (ADR-0015). Поле аддитивно (wire-совместимо).
  bool system = 3;
}

// SubjectRoles — субъект и набор имён его ролей.
message SubjectRoles {
  // subject — идентификатор субъекта (sub из JWT).
  string subject = 1;
  // roles — имена ролей субъекта.
  repeated string roles = 2;
}

message ListRolesRequest {}

message ListRolesResponse {
  // roles — полный список ролей каталога.
  repeated Role roles = 1;
}

message ListPermissionsRequest {}

message ListPermissionsResponse {
  // permissions — полный список прав каталога.
  repeated Permission permissions = 1;
}

message GetRolePermissionsRequest {
  // role — имя роли, чьи права запрашиваются.
  string role = 1;
}

message GetRolePermissionsResponse {
  // permissions — права запрошенной роли.
  repeated Permission permissions = 1;
}

message ListSubjectsWithRolesRequest {
  // page_size — желаемый размер страницы; сервер клампит к пределу (0 → дефолт).
  int32 page_size = 1;
  // page_token — непрозрачный курсор keyset (пусто — первая страница).
  string page_token = 2;
}

message ListSubjectsWithRolesResponse {
  // subjects — страница субъектов с их ролями (ASC по subject).
  repeated SubjectRoles subjects = 1;
  // next_page_token — курсор следующей страницы (пусто — страниц больше нет).
  string next_page_token = 2;
}

message GetSubjectRolesRequest {
  // subject — идентификатор субъекта.
  string subject = 1;
}

message GetSubjectRolesResponse {
  // roles — имена ролей субъекта (пусто, если ролей нет).
  repeated string roles = 1;
}

message CheckAccessRequest {
  // subject — идентификатор пользователя/сервиса (например, sub из JWT).
  string subject = 1;
  // resource — целевой ресурс (например, "project:acme").
  string resource = 2;
  // action — действие (например, "create", "transfer", "decommission").
  string action = 3;
}

message CheckAccessResponse {
  // allowed — итоговое решение политики.
  bool allowed = 1;
  // reason — машинно-читаемая причина отказа (для логов/отладки), необязательна.
  string reason = 2;
}

message AssignRoleRequest {
  // subject — идентификатор субъекта (sub из JWT).
  string subject = 1;
  // role — имя роли (например, "owner:project:demo").
  string role = 2;
}

message AssignRoleResponse {}

message RevokeRoleRequest {
  // subject — идентификатор субъекта.
  string subject = 1;
  // role — имя роли.
  string role = 2;
}

message RevokeRoleResponse {}

// RolePermissions — роль и актуальный набор её прав (ответ attach/detach).
message RolePermissions {
  // role — имя роли.
  string role = 1;
  // permissions — текущий набор прав роли после операции.
  repeated Permission permissions = 2;
}

message CreateRoleRequest {
  // name — имя создаваемой роли (непустое, уникальное).
  string name = 1;
}

message CreateRoleResponse {
  // role — созданная роль (system=false).
  Role role = 1;
}

message DeleteRoleRequest {
  // name — имя удаляемой роли.
  string name = 1;
}

message DeleteRoleResponse {}

message CreatePermissionRequest {
  // action — действие создаваемого права (непустое).
  string action = 1;
  // resource — ресурс создаваемого права (непустой).
  string resource = 2;
}

message CreatePermissionResponse {
  // permission — созданное право (system=false).
  Permission permission = 1;
}

message DeletePermissionRequest {
  // action — действие удаляемого права.
  string action = 1;
  // resource — ресурс удаляемого права.
  string resource = 2;
}

message DeletePermissionResponse {}

message AttachPermissionRequest {
  // role — имя роли, к которой прикрепляется право.
  string role = 1;
  // action — действие прикрепляемого права.
  string action = 2;
  // resource — ресурс прикрепляемого права.
  string resource = 3;
}

message AttachPermissionResponse {
  // role_permissions — актуальный набор прав роли после прикрепления.
  RolePermissions role_permissions = 1;
}

message DetachPermissionRequest {
  // role — имя роли, от которой открепляется право.
  string role = 1;
  // action — действие открепляемого права.
  string action = 2;
  // resource — ресурс открепляемого права.
  string resource = 3;
}

message DetachPermissionResponse {
  // role_permissions — актуальный набор прав роли после открепления.
  RolePermissions role_permissions = 1;
}
