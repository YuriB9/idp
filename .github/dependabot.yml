# Dependabot — автообновление зависимостей (docs/IDP_MVP_plan.md, БЛОК 0).
# По одной gomod-экосистеме на модуль go.work + изолированный tools,
# github-actions и npm для портала.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /pkg
    schedule:
      interval: weekly
  - package-ecosystem: gomod
    directory: /services/gateway
    schedule:
      interval: weekly
  - package-ecosystem: gomod
    directory: /services/idm
    schedule:
      interval: weekly
  - package-ecosystem: gomod
    directory: /services/projects
    schedule:
      interval: weekly
  - package-ecosystem: gomod
    directory: /services/devinfra-worker
    schedule:
      interval: weekly
  - package-ecosystem: gomod
    directory: /tests/e2e
    schedule:
      interval: weekly
  - package-ecosystem: gomod
    directory: /tools
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
