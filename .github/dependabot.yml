# Dependabot — автообновление зависимостей (docs/IDP_MVP_plan.md, БЛОК 0).
# По одной gomod-экосистеме на модуль go.work + изолированный tools,
# github-actions и npm для портала.
#
# Группировка gomod: minor/patch-обновления в каждом модуле батчатся в один
# еженедельный PR (group go-deps), чтобы общие зависимости бампались согласованно
# и не плодили разрозненные PR на каждую либу (ср. #75/#76). Мажорные апдейты
# остаются отдельными PR (ревью вручную). После bump общей зависимости —
# `make tidy-all` держит зависимые модули (devinfra-worker → projects) тидёнными
# в порядке зависимостей (не повторяя падение PR #75).
version: 2
updates:
  - package-ecosystem: gomod
    directory: /pkg
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: gomod
    directory: /services/gateway
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: gomod
    directory: /services/idm
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: gomod
    directory: /services/projects
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: gomod
    directory: /services/devinfra-worker
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: gomod
    directory: /tests/e2e
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: gomod
    directory: /tools
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      # Vite и его плагины связаны peer-зависимостями (plugin-react требует
      # vite того же мажора). Поэлементный bump упирается в ERESOLVE (см. PR
      # #64/#26: plugin-react 6 ↔ vite 6) — группируем, чтобы dependabot
      # предлагал согласованный апгрейд одним PR.
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/vite"
          - "vitest"
    ignore:
      # openapi-typescript@7.x / openapi-zod-client требуют peer typescript@^5.x.
      # Мажорные апгрейды TypeScript (6+) ломают codegen-тулчейн — игнорируем,
      # пока инструменты не выпустят поддержку. См. закрытый PR #7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
