# CI платформы IDP — БЛОК 0 (docs/IDP_MVP_plan.md): блокирующий с первого
# коммита. Матрица по модулям go.work + govulncheck + codegen-check + integration.
name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"

jobs:
  test:
    name: test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg
          - services/gateway
          - services/idm
          - services/projects
          - services/devinfra-worker
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go test -race -shuffle=on
        working-directory: ${{ matrix.module }}
        run: go test -race -shuffle=on ./...

  tidy:
    name: go mod tidy --check (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg
          - services/gateway
          - services/idm
          - services/projects
          - services/devinfra-worker
          - tests/e2e
          - tools
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: tidy and verify no diff
        working-directory: ${{ matrix.module }}
        env:
          GOWORK: "off"
        run: |
          go mod tidy
          git diff --exit-code

  lint:
    name: golangci-lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg
          - services/gateway
          - services/idm
          - services/projects
          - services/devinfra-worker
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}

  govulncheck:
    name: govulncheck (blocking, ${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg
          - services/gateway
          - services/idm
          - services/projects
          - services/devinfra-worker
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: run govulncheck
        working-directory: ${{ matrix.module }}
        env:
          GOWORK: "off"
        run: govulncheck ./...

  openapi-lint:
    name: openapi lint (Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: install web deps (pinned Spectral)
        working-directory: web
        run: npm ci
      - name: spectral lint openapi/openapi.yaml
        working-directory: web
        run: npm run lint:openapi

  codegen-check:
    name: codegen reproducibility (.proto + OpenAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: regenerate proto stubs
        run: make proto
      - name: regenerate OpenAPI TS client
        run: |
          cd web && npm ci
          npm run gen
      - name: verify no diff
        run: git diff --exit-code

  web-test:
    name: web tests (vitest) + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: install web deps
        working-directory: web
        run: npm ci
      - name: typecheck
        working-directory: web
        run: npx tsc --noEmit
      - name: vitest
        working-directory: web
        run: npm test

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    services:
      # Postgres каталога проектов для интеграционных тестов repository.
      postgres-projects:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: projects
          POSTGRES_PASSWORD: projects
          POSTGRES_DB: projects
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U projects"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      PROJECTS_DSN: "postgres://projects:projects@localhost:5432/projects?sslmode=disable"
      PROJECTS_TEST_DSN: "postgres://projects:projects@localhost:5432/projects?sslmode=disable"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: build integration suite
        working-directory: tests/e2e
        run: go test -tags=integration -run TestPerimeter ./...
      - name: apply projects migrations
        run: make migrate-projects
      - name: projects catalog integration tests
        working-directory: services/projects
        run: go test -tags=integration -race ./internal/repository/...
