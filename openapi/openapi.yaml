openapi: 3.1.0
info:
  title: IDP Perimeter API
  version: 0.3.0
  description: >
    Контракт периметра (портал ↔ API-шлюз) платформы IDP. Источник правды для
    кодогена TS-клиента и zod-схем.
servers:
  - url: /api
paths:
  # Операционные эндпоинты /healthz и /readyz сознательно НЕ описаны здесь: они
  # живут в КОРНЕ сервиса (для k8s-проб, см. pkg/httpserver), а не под префиксом
  # /api периметра. Контракт периметра (портал↔gateway) — только ресурсы под /api.
  /projects/{project}/services:
    get:
      operationId: listServices
      summary: Список сервисов проекта с keyset-пагинацией
      description: >
        Возвращает страницу сервисов проекта с keyset-пагинацией
        (page_size/page_token). Требует право list на project:{project}; отказ
        RBAC → 403. Курсор непрозрачен и пробрасывается без интерпретации.
      parameters:
        - $ref: "#/components/parameters/ProjectPath"
        - name: page_size
          in: query
          required: false
          description: >
            Желаемый размер страницы; сервер клампит к допустимому пределу.
            Значение должно укладываться в int32 (1..2147483647); выход за
            диапазон — 400.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 2147483647
        - name: page_token
          in: query
          required: false
          description: >
            Непрозрачный курсор продолжения из предыдущего ответа; пустой —
            с начала выборки.
          schema:
            type: string
      responses:
        "200":
          description: Страница сервисов проекта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createService
      summary: Запуск создания сервиса в проекте
      description: >
        Запускает создание сервиса в проекте (асинхронная провизия репозитория,
        образов и секретов). Запись каталога фиксируется со статусом creating;
        требует право create на project:{project} (отказ RBAC → 403). Занятое имя
        в проекте → 409.
      parameters:
        - $ref: "#/components/parameters/ProjectPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Создание запущено, запись зафиксирована со статусом creating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateServiceResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /projects/{project}/services/{name}:
    get:
      operationId: getService
      summary: Чтение статуса одного сервиса проекта
      description: >
        Возвращает текущее состояние сервиса (статус, владельцы, версия). Требует
        право read на project:{project} (отказ RBAC → 403); отсутствие сервиса →
        404.
      parameters:
        - $ref: "#/components/parameters/ProjectPath"
        - $ref: "#/components/parameters/ServiceNamePath"
      responses:
        "200":
          description: Текущее состояние сервиса
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceSummary"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /projects/{project}/services/{name}/decommission:
    post:
      operationId: decommissionService
      summary: Вывод сервиса из эксплуатации (soft delete)
      description: >
        Выводит активный сервис из эксплуатации (soft delete): данные каталога
        сохраняются, статус переводится в decommissioned, во внешних системах
        отзывается доступ (GitLab archive, Harbor read-only, Vault revoke).
        Тело несёт явное предусловие load_drained (нагрузка снята из K8s, ADR-0012).
        Идемпотентно: повтор на уже выведенном сервисе → 200. Допустим только
        исходный статус active; предусловие не выполнено (нагрузка не снята или
        статус creating/failed) → 422; конкурентная смена статуса → 409; отсутствие
        сервиса → 404; отказ RBAC (право decommission) → 403.
      parameters:
        - $ref: "#/components/parameters/ProjectPath"
        - $ref: "#/components/parameters/ServiceNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecommissionServiceRequest"
      responses:
        "200":
          description: Вывод из эксплуатации запущен (или сервис уже выведен)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/PreconditionFailed"
  /projects/{project}/services/{name}/owners:
    put:
      operationId: setServiceOwners
      summary: Декларативная замена набора владельцев сервиса
      description: >
        Заменяет набор владельцев целиком (идемпотентно). Клиент передаёт полный
        желаемый набор owners и текущую версию owners_version
        (optimistic-concurrency). Несовпадение версии → 409; отсутствие сервиса →
        404; отказ RBAC (право change_owners) → 403.
      parameters:
        - $ref: "#/components/parameters/ProjectPath"
        - $ref: "#/components/parameters/ServiceNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetServiceOwnersRequest"
      responses:
        "200":
          description: Изменение владельцев запущено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetServiceOwnersResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /projects/{project}/services/{name}/transfer:
    post:
      operationId: transferService
      summary: Перенос сервиса в другой проект
      description: >
        Переносит сервис в другой проект (смена project-владельца): id записи
        каталога сохраняется, меняется проект (source→target), владельцы переезжают
        вместе с записью. Перенос выполняется асинхронно (Saga) с ТОЧКОЙ НЕВОЗВРАТА
        на переносе репозитория GitLab: каталог active→transferring → transfer
        GitLab → миграция путей Vault → метаданные Harbor → каталог
        transferring→active (project=target) → перенос ролей владельцев в IDM.
        Требует ДВУХ прав: transfer на исходном проекте И transfer_in на целевом
        (ADR-0013). Идемпотентно: повтор на уже перенесённом сервисе → 200.
        Допустим только исходный статус active; недопустимый статус → 422; занятое
        имя в target или конкурентная смена → 409; отсутствие сервиса → 404; отказ
        RBAC (transfer/transfer_in) → 403.
      parameters:
        - $ref: "#/components/parameters/ProjectPath"
        - $ref: "#/components/parameters/ServiceNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferServiceRequest"
      responses:
        "200":
          description: Перенос запущен (или сервис уже перенесён)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/PreconditionFailed"
  /iam/roles:
    get:
      operationId: listRoles
      summary: Список ролей каталога RBAC
      description: >
        Возвращает все роли каталога (read-only). Привилегированная ручка
        IAM-админки: требует право (read, iam:global); отказ/недоступность IDM →
        403 (fail-closed). Роли/права сидируются миграциями — UI их только
        показывает (ADR-0014).
      responses:
        "200":
          description: Список ролей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleList"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createRole
      summary: Создать роль каталога RBAC
      description: >
        Создаёт пользовательскую роль (system=false). Привилегированная
        структурная мутация каталога: требует право (manage, iam:global);
        отказ/недоступность IDM → 403 (fail-closed). Повторное создание роли с тем
        же именем → 409 (не идемпотентно); пустое имя → 400. После мутации IDM
        широко инвалидирует кэш решений (ADR-0015).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Роль создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /iam/roles/{role}:
    delete:
      operationId: deleteRole
      summary: Удалить роль каталога RBAC
      description: >
        Удаляет роль (каскадно снимает её у всех носителей и убирает связки прав).
        Требует право (manage, iam:global); отказ/недоступность IDM → 403
        (fail-closed). Системная (сидированная) роль защищена от удаления → 422;
        несуществующая роль → 404. После мутации IDM широко инвалидирует кэш
        решений, т.к. затронуты все носители роли (ADR-0015).
      parameters:
        - $ref: "#/components/parameters/RolePath"
      responses:
        "200":
          description: Роль удалена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/PreconditionFailed"
  /iam/permissions:
    get:
      operationId: listPermissions
      summary: Список прав каталога RBAC
      description: >
        Возвращает все права каталога (read-only). Требует право (read,
        iam:global); отказ/недоступность IDM → 403 (fail-closed).
      responses:
        "200":
          description: Список прав
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionList"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createPermission
      summary: Создать право каталога RBAC
      description: >
        Создаёт пользовательское право (system=false) с произвольной парой
        (action, resource); матчинг строгий. Требует право (manage, iam:global);
        отказ/недоступность IDM → 403 (fail-closed). Дубль пары (action, resource)
        → 409; пустые поля → 400. После мутации IDM широко инвалидирует кэш
        решений (ADR-0015).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePermissionRequest"
      responses:
        "201":
          description: Право создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Permission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deletePermission
      summary: Удалить право каталога RBAC
      description: >
        Удаляет право по паре (action, resource), переданной в query-параметрах
        (каскадно убирает связки права с ролями). Требует право (manage,
        iam:global); отказ/недоступность IDM → 403 (fail-closed). Системное право
        защищено от удаления → 422; несуществующее право → 404; пустые поля → 400.
        После мутации IDM широко инвалидирует кэш решений (ADR-0015).
      parameters:
        - $ref: "#/components/parameters/ActionQuery"
        - $ref: "#/components/parameters/ResourceQuery"
      responses:
        "200":
          description: Право удалено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Permission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/PreconditionFailed"
  /iam/roles/{role}/permissions:
    get:
      operationId: getRolePermissions
      summary: Права конкретной роли
      description: >
        Возвращает права роли (read-only). Требует право (read, iam:global);
        отказ/недоступность IDM → 403 (fail-closed); несуществующая роль → 404.
      parameters:
        - $ref: "#/components/parameters/RolePath"
      responses:
        "200":
          description: Права роли
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionList"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: attachPermission
      summary: Прикрепить право к роли
      description: >
        Прикрепляет существующее право к роли (идемпотентно: повтор уже
        привязанного → 200). Требует право (manage, iam:global);
        отказ/недоступность IDM → 403 (fail-closed). Несуществующая роль или право
        → 404; системная роль (её состав прав фиксирован) → 422; пустые поля → 400.
        Ответ — актуальный набор прав роли. После мутации IDM широко инвалидирует
        кэш решений, т.к. затронуты все носители роли (ADR-0015).
      parameters:
        - $ref: "#/components/parameters/RolePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachPermissionRequest"
      responses:
        "200":
          description: Право прикреплено (или уже было прикреплено)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePermissions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/PreconditionFailed"
    delete:
      operationId: detachPermission
      summary: Открепить право от роли
      description: >
        Открепляет право от роли по паре (action, resource) в query-параметрах
        (идемпотентно: открепление непривязанного → 200). Требует право (manage,
        iam:global); отказ/недоступность IDM → 403 (fail-closed). Несуществующая
        роль → 404; системная роль → 422; пустые поля → 400. Ответ — актуальный
        набор прав роли. После мутации IDM широко инвалидирует кэш решений (ADR-0015).
      parameters:
        - $ref: "#/components/parameters/RolePath"
        - $ref: "#/components/parameters/ActionQuery"
        - $ref: "#/components/parameters/ResourceQuery"
      responses:
        "200":
          description: Право откреплено (или его и не было)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePermissions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/PreconditionFailed"
  /iam/subjects:
    get:
      operationId: listSubjects
      summary: Субъекты с их ролями
      description: >
        Возвращает страницу субъектов (DISTINCT subject из subject_roles) с их
        ролями; keyset-пагинация по subject. Субъекты без ролей системе
        неизвестны и не возвращаются. Требует право (read, iam:global);
        отказ/недоступность IDM → 403 (fail-closed).
      parameters:
        - $ref: "#/components/parameters/PageSizeQuery"
        - $ref: "#/components/parameters/PageTokenQuery"
      responses:
        "200":
          description: Страница субъектов с ролями
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /iam/subjects/{subject}/roles:
    get:
      operationId: getSubjectRoles
      summary: Роли конкретного субъекта
      description: >
        Возвращает роли субъекта (пустой набор, не 404, если ролей нет). Требует
        право (read, iam:global); отказ/недоступность IDM → 403 (fail-closed).
      parameters:
        - $ref: "#/components/parameters/SubjectPath"
      responses:
        "200":
          description: Роли субъекта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectRoles"
        "403":
          $ref: "#/components/responses/Forbidden"
  /iam/subjects/{subject}/roles/{role}:
    post:
      operationId: assignRole
      summary: Назначить роль субъекту
      description: >
        Назначает субъекту существующую роль (идемпотентно: повтор → 200). Требует
        право (write, iam:global); отказ/недоступность IDM → 403 (fail-closed).
        Несуществующая роль → 404; пустые subject/role → 400. После мутации IDM
        инвалидирует кэш решений по субъекту. Ответ — актуальный набор ролей
        субъекта (ADR-0014).
      parameters:
        - $ref: "#/components/parameters/SubjectPath"
        - $ref: "#/components/parameters/RolePath"
      responses:
        "200":
          description: Роль назначена (или уже была назначена)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectRoles"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: revokeRole
      summary: Снять роль с субъекта
      description: >
        Снимает у субъекта роль (идемпотентно: снятие отсутствующей связки → 200).
        Требует право (write, iam:global); отказ/недоступность IDM → 403
        (fail-closed); пустые subject/role → 400. После мутации IDM инвалидирует
        кэш решений по субъекту. Ответ — актуальный набор ролей субъекта.
      parameters:
        - $ref: "#/components/parameters/SubjectPath"
        - $ref: "#/components/parameters/RolePath"
      responses:
        "200":
          description: Роль снята (или её и не было)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubjectRoles"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /iam/directory/subjects:
    get:
      operationId: searchDirectorySubjects
      summary: Поиск пользователей в каталоге идентичностей
      description: >
        Ищет пользователей realm Keycloak по строке (username/email/имя) с
        постраничной выдачей (непрозрачный курсор поверх offset Keycloak).
        Используется пикером назначения роли (ADR-0016). Требует ОТДЕЛЬНОЕ право
        (read, iam:directory) — просмотр PII; отказ/недоступность IDM → 403
        (fail-closed). Пустой search или некорректный page_size/cursor → 400.
        Каталог Keycloak недоступен → 503 (деградация, retryable). Внутренние
        ошибки наружу не раскрываются.
      parameters:
        - name: search
          in: query
          required: true
          description: Строка поиска (username/email/имя); непустая.
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: Непрозрачный курсор страницы (пусто — первая страница).
          schema:
            type: string
        - $ref: "#/components/parameters/PageSizeQuery"
      responses:
        "200":
          description: Страница найденных пользователей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectorySubjectList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /iam/directory/subjects/resolve:
    post:
      operationId: resolveDirectorySubjects
      summary: Батч-резолв субъектов в идентичности
      description: >
        Резолвит набор канонических ключей (sub) в идентичности
        (username/email/display name) из каталога Keycloak (ADR-0016).
        Отсутствующие в каталоге субъекты возвращаются с found=false (не
        опускаются) — «осиротевшие». Требует право (read, iam:directory);
        отказ/недоступность IDM → 403 (fail-closed). Пустой список → 400; каталог
        Keycloak недоступен → 503 (деградация). Внутренние ошибки наружу не
        раскрываются.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveSubjectsRequest"
      responses:
        "200":
          description: Идентичности запрошенных субъектов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectorySubjectResolveResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
components:
  parameters:
    ProjectPath:
      name: project
      in: path
      required: true
      description: Идентификатор проекта-владельца.
      schema:
        type: string
        minLength: 1
    ServiceNamePath:
      name: name
      in: path
      required: true
      description: Имя сервиса внутри проекта.
      schema:
        type: string
        minLength: 1
    SubjectPath:
      name: subject
      in: path
      required: true
      description: Идентификатор субъекта (sub из JWT).
      schema:
        type: string
        minLength: 1
    RolePath:
      name: role
      in: path
      required: true
      description: Имя роли каталога RBAC.
      schema:
        type: string
        minLength: 1
    PageSizeQuery:
      name: page_size
      in: query
      required: false
      description: >
        Желаемый размер страницы; сервер клампит к допустимому пределу. Значение
        должно укладываться в int32 (1..2147483647); выход за диапазон — 400.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 2147483647
    PageTokenQuery:
      name: page_token
      in: query
      required: false
      description: >
        Непрозрачный курсор продолжения из предыдущего ответа; пустой — с начала
        выборки.
      schema:
        type: string
    ActionQuery:
      name: action
      in: query
      required: true
      description: Действие права (часть идентификатора пары action/resource).
      schema:
        type: string
        minLength: 1
    ResourceQuery:
      name: resource
      in: query
      required: true
      description: Ресурс права (часть идентификатора пары action/resource).
      schema:
        type: string
        minLength: 1
  responses:
    BadRequest:
      description: Некорректный запрос (валидация входных данных)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Конфликт состояния (например, имя сервиса уже занято)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Доступ запрещён (RBAC, fail-closed)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PreconditionFailed:
      description: >
        Предусловие операции не выполнено (например, нагрузка не снята из K8s или
        недопустимый исходный статус сервиса).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: >
        Внешняя зависимость временно недоступна (каталог идентичностей Keycloak).
        Справочник субъектов деградирует, не ломая управление ролями по сырому
        subject (ADR-0016); запрос можно повторить позже.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    ServiceStatus:
      type: string
      description: Статус сервиса в каталоге (ADR-0004).
      enum: [creating, active, decommissioned, failed, transferring]
    ServiceSummary:
      type: object
      required: [project, name, status, owners, owners_version]
      properties:
        project:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/ServiceStatus"
        owners:
          type: array
          description: Набор владельцев сервиса (детерминированный порядок).
          items:
            type: string
        owners_version:
          type: integer
          format: int64
          description: Версия набора владельцев для optimistic-concurrency.
        decommissioned_at:
          type: string
          description: >
            Момент вывода сервиса из эксплуатации (RFC3339); отсутствует/пусто,
            если сервис не выведен (ADR-0012).
    ServiceList:
      type: object
      required: [services, next_page_token]
      properties:
        services:
          type: array
          items:
            $ref: "#/components/schemas/ServiceSummary"
        next_page_token:
          type: string
          description: Курсор следующей страницы; пустой — конец выборки.
    CreateServiceRequest:
      type: object
      required: [name, owners]
      properties:
        name:
          type: string
          minLength: 1
          description: Имя создаваемого сервиса внутри проекта.
        owners:
          type: array
          minItems: 1
          description: >
            Обязательный набор владельцев создаваемого сервиса. Минимум один
            непустой владелец; сервер нормализует (без пустых строк и дублей) и
            устанавливает атомарно с созданием (ADR-0011/0023).
          items:
            type: string
            minLength: 1
    CreateServiceResult:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          description: Идентификатор созданной записи каталога.
        status:
          $ref: "#/components/schemas/ServiceStatus"
    SetServiceOwnersRequest:
      type: object
      required: [owners, owners_version]
      properties:
        owners:
          type: array
          description: >
            Полный желаемый набор владельцев (декларативно). Без пустых строк и
            дублей; сервер вычисляет diff против текущего состояния.
          items:
            type: string
            minLength: 1
        owners_version:
          type: integer
          format: int64
          description: Ожидаемая версия набора владельцев (optimistic-concurrency).
    SetServiceOwnersResult:
      type: object
      required: [owners, owners_version]
      properties:
        owners:
          type: array
          description: Итоговый набор владельцев после применения.
          items:
            type: string
        owners_version:
          type: integer
          format: int64
          description: Новая версия набора владельцев.
    DecommissionServiceRequest:
      type: object
      required: [load_drained]
      properties:
        load_drained:
          type: boolean
          description: >
            Явное предусловие: нагрузка сервиса снята из K8s. В MVP K8s-worker
            отсутствует, поэтому снятие подтверждается клиентом (ADR-0012).
            false → 422 до любых побочных эффектов.
    TransferServiceRequest:
      type: object
      required: [target_project]
      properties:
        target_project:
          type: string
          minLength: 1
          description: >
            Целевой проект-владелец (target), в который переносится сервис. Должен
            отличаться от исходного проекта; пара (target_project, name) должна
            быть свободна, иначе 409.
    Role:
      type: object
      required: [name, system]
      properties:
        name:
          type: string
          description: >
            Имя роли — её стабильный идентификатор (им оперируют assign/revoke);
            внутренний id наружу не отдаётся (ADR-0014).
        system:
          type: boolean
          description: >
            Признак системной (сидированной) роли: защищена от удаления и правки
            набора прав через API. UI скрывает для таких роль удаление/правку
            (ADR-0015).
    Permission:
      type: object
      required: [action, resource, system]
      properties:
        action:
          type: string
          description: Действие (например, read, write, create, manage).
        resource:
          type: string
          description: Целевой ресурс (например, iam:global, project:demo).
        system:
          type: boolean
          description: >
            Признак системного (сидированного) права: защищено от удаления через
            API (ADR-0015).
    RolePermissions:
      type: object
      required: [role, permissions]
      properties:
        role:
          type: string
          description: Имя роли.
        permissions:
          type: array
          description: Актуальный набор прав роли после операции.
          items:
            $ref: "#/components/schemas/Permission"
    CreateRoleRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          description: Имя создаваемой роли (непустое, уникальное).
    CreatePermissionRequest:
      type: object
      required: [action, resource]
      properties:
        action:
          type: string
          minLength: 1
          description: Действие создаваемого права.
        resource:
          type: string
          minLength: 1
          description: Ресурс создаваемого права.
    AttachPermissionRequest:
      type: object
      required: [action, resource]
      properties:
        action:
          type: string
          minLength: 1
          description: Действие прикрепляемого права.
        resource:
          type: string
          minLength: 1
          description: Ресурс прикрепляемого права.
    RoleList:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
    PermissionList:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
    SubjectRoles:
      type: object
      required: [subject, roles]
      properties:
        subject:
          type: string
          description: Канонический ключ субъекта (sub из JWT, UUID Keycloak).
        roles:
          type: array
          description: Имена ролей субъекта (пусто, если ролей нет).
          items:
            type: string
        identity:
          allOf:
            - $ref: "#/components/schemas/SubjectIdentity"
          description: >
            Опциональная идентичность субъекта из каталога Keycloak (ADR-0016).
            Присутствует ТОЛЬКО при обогащении: вызывающий держит право
            (read, iam:directory) и каталог доступен. Отсутствует, если права нет
            (PII не раскрывается) или Keycloak недоступен (деградация). Для
            «осиротевшего» субъекта присутствует с found=false.
    SubjectIdentity:
      type: object
      required: [subject, username, email, display_name, enabled, found]
      properties:
        subject:
          type: string
          description: Канонический ключ субъекта (sub = UUID Keycloak).
        username:
          type: string
          description: Имя входа (preferred_username); ключом авторизации НЕ является.
        email:
          type: string
          description: Адрес электронной почты пользователя.
        display_name:
          type: string
          description: Отображаемое имя (имя + фамилия), если задано.
        enabled:
          type: boolean
          description: Активен ли пользователь в realm.
        found:
          type: boolean
          description: >
            Найден ли субъект в каталоге. false → «осиротевший»: роль есть, в
            каталоге Keycloak его нет.
    DirectorySubjectList:
      type: object
      required: [subjects, next_cursor]
      properties:
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/SubjectIdentity"
        next_cursor:
          type: string
          description: >
            Непрозрачный курсор следующей страницы (поверх offset Keycloak);
            пустой — страниц больше нет.
    DirectorySubjectResolveResult:
      type: object
      required: [subjects]
      properties:
        subjects:
          type: array
          description: >
            Идентичности в составе запрошенных ключей; отсутствующие в каталоге —
            с found=false (не опускаются).
          items:
            $ref: "#/components/schemas/SubjectIdentity"
    ResolveSubjectsRequest:
      type: object
      required: [subjects]
      properties:
        subjects:
          type: array
          description: Канонические ключи (sub) для резолва (непустой список).
          items:
            type: string
    SubjectList:
      type: object
      required: [subjects, next_page_token]
      properties:
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/SubjectRoles"
        next_page_token:
          type: string
          description: Курсор следующей страницы; пустой — конец выборки.
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: >
            Стабильное сообщение об ошибке для клиента. Внутренние детали
            (текст gRPC-ошибки) сюда НЕ попадают — только в лог сервера.
